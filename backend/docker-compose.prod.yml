version: "3.9"

services:
  backend:
    build: .
    container_name: tripmind_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s